<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile RPG Badge System - Interactive Prototype</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@10/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #0f0f1e;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .title-font {
            font-family: 'Cinzel', serif;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        @keyframes urgent-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15) rotate(5deg); opacity: 0.9; }
        }

        .badge-pulse { animation: pulse 2s ease-in-out infinite; }
        .badge-bounce { animation: bounce 1s ease-in-out infinite; }
        .badge-urgent { animation: urgent-pulse 1.5s ease-in-out infinite; }

        .map-building {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .map-building:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = Motion;

        // Badge Components
        const RedDot = () => (
            <div className="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white shadow-lg badge-pulse" />
        );

        const GreenArrow = () => (
            <div className="absolute -top-2 -right-2 w-6 h-6 bg-green-500 rounded-full border-2 border-white shadow-lg flex items-center justify-center badge-bounce">
                <span className="text-white text-xs font-bold">↑</span>
            </div>
        );

        const NewBadge = () => (
            <div className="absolute -top-2 -right-2 bg-blue-500 px-2 py-0.5 rounded text-white text-[10px] font-bold border-2 border-white shadow-lg">
                NEW
            </div>
        );

        const NumberBadge = ({ count }) => (
            <div className="absolute -top-2 -right-2 min-w-6 h-6 bg-purple-500 rounded-full border-2 border-white shadow-lg flex items-center justify-center px-1.5">
                <span className="text-white text-xs font-bold">{count}</span>
            </div>
        );

        const ExclamationBadge = () => (
            <div className="absolute -top-2 -right-2 w-6 h-6 bg-amber-500 rounded-full border-2 border-white shadow-lg flex items-center justify-center badge-urgent">
                <span className="text-white text-sm font-bold">!</span>
            </div>
        );

        // Get priority badge
        const getBadge = (badges) => {
            if (badges.exclamation) return <ExclamationBadge />;
            if (badges.arrow) return <GreenArrow />;
            if (badges.number) return <NumberBadge count={badges.number} />;
            if (badges.new) return <NewBadge />;
            if (badges.dot) return <RedDot />;
            return null;
        };

        // Main App
        const App = () => {
            const [screen, setScreen] = useState('map');
            const [badges, setBadges] = useState({
                heroes: { arrow: true, number: 3 },
                buildings: { new: true },
                quests: { number: 5 },
                events: { exclamation: true },
                mail: { number: 12 },
                mapBuilding1: { arrow: true },
                mapBuilding2: { new: true },
                mapBuilding3: { dot: true },
                hero1: { arrow: true, new: true },
                hero2: { arrow: true },
                hero3: { new: true },
                hero4: { dot: true },
                building1: { arrow: true },
                building2: { new: true },
                building3: { dot: true }
            });

            const clearBadge = (key) => {
                setBadges(prev => {
                    const newBadges = { ...prev };
                    delete newBadges[key];
                    return newBadges;
                });
            };

            const resetPrototype = () => {
                setBadges({
                    heroes: { arrow: true, number: 3 },
                    buildings: { new: true },
                    quests: { number: 5 },
                    events: { exclamation: true },
                    mail: { number: 12 },
                    mapBuilding1: { arrow: true },
                    mapBuilding2: { new: true },
                    mapBuilding3: { dot: true },
                    hero1: { arrow: true, new: true },
                    hero2: { arrow: true },
                    hero3: { new: true },
                    hero4: { dot: true },
                    building1: { arrow: true },
                    building2: { new: true },
                    building3: { dot: true }
                });
                setScreen('map');
            };

            const HUDButton = ({ icon, label, badgeKey, onClick }) => (
                <motion.button
                    whileTap={{ scale: 0.95 }}
                    onClick={onClick}
                    className="relative bg-gradient-to-br from-purple-900/80 to-purple-800/80 backdrop-blur-sm border-2 border-purple-500/40 rounded-lg px-3 py-2 text-white font-semibold text-sm shadow-lg hover:border-purple-400/60 transition-all"
                >
                    {icon && <div className="text-xl mb-1">{icon}</div>}
                    <div className="text-xs">{label}</div>
                    {badges[badgeKey] && getBadge(badges[badgeKey])}
                </motion.button>
            );

            const MapBuilding = ({ x, y, icon, badgeKey }) => (
                <motion.g
                    className="map-building"
                    whileTap={{ scale: 0.9 }}
                    onClick={() => {
                        clearBadge(badgeKey);
                        setScreen('buildingDetail');
                    }}
                >
                    <circle cx={x} cy={y} r="20" fill="#8B4513" opacity="0.3" />
                    <text x={x} y={y} textAnchor="middle" dominantBaseline="middle" fontSize="24">
                        {icon}
                    </text>
                    {badges[badgeKey] && (
                        <g>
                            {badges[badgeKey].arrow && (
                                <circle cx={x + 15} cy={y - 15} r="8" fill="#10B981" stroke="white" strokeWidth="2">
                                    <animate attributeName="r" values="8;10;8" dur="1s" repeatCount="indefinite" />
                                </circle>
                            )}
                            {badges[badgeKey].new && (
                                <rect x={x + 10} y={y - 20} width="24" height="12" fill="#3B82F6" stroke="white" strokeWidth="2" rx="2" />
                            )}
                            {badges[badgeKey].dot && (
                                <circle cx={x + 15} cy={y - 15} r="6" fill="#EF4444" stroke="white" strokeWidth="2">
                                    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" />
                                </circle>
                            )}
                        </g>
                    )}
                </motion.g>
            );

            return (
                <div className="w-screen h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 relative overflow-hidden">
                    {/* Reset Button */}
                    <motion.button
                        whileTap={{ scale: 0.95 }}
                        onClick={resetPrototype}
                        className="absolute top-4 right-4 z-50 bg-gradient-to-r from-amber-600 to-amber-700 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-lg border-2 border-amber-400 hover:from-amber-500 hover:to-amber-600 transition-all"
                    >
                        🔄 Reset Prototype
                    </motion.button>

                    {/* Map Screen */}
                    <AnimatePresence mode="wait">
                        {screen === 'map' && (
                            <motion.div
                                key="map"
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                className="w-full h-full relative"
                            >
                                {/* Map Background */}
                                <svg className="absolute inset-0 w-full h-full opacity-30" viewBox="0 0 800 600">
                                    <defs>
                                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="1"/>
                                        </pattern>
                                    </defs>
                                    <rect width="800" height="600" fill="url(#grid)" />

                                    {/* Territory areas */}
                                    <path d="M 100,100 Q 200,120 300,150 L 300,400 Q 250,450 150,450 L 100,400 Z" fill="rgba(34, 197, 94, 0.2)" stroke="rgba(34, 197, 94, 0.4)" strokeWidth="3" />
                                    <path d="M 500,100 L 700,100 L 700,400 Q 650,450 550,400 L 450,300 Q 450,150 500,100 Z" fill="rgba(239, 68, 68, 0.2)" stroke="rgba(239, 68, 68, 0.4)" strokeWidth="3" />
                                </svg>

                                {/* Map Buildings */}
                                <svg className="absolute inset-0 w-full h-full" viewBox="0 0 800 600">
                                    <MapBuilding x={200} y={250} icon="🏰" badgeKey="mapBuilding1" />
                                    <MapBuilding x={400} y={300} icon="⚔️" badgeKey="mapBuilding2" />
                                    <MapBuilding x={600} y={250} icon="🏛️" badgeKey="mapBuilding3" />
                                </svg>

                                {/* HUD Overlay */}
                                <div className="absolute top-16 left-0 right-0 px-4">
                                    <div className="bg-black/40 backdrop-blur-md rounded-lg p-4 border border-purple-500/30">
                                        <div className="flex justify-between items-center mb-2">
                                            <div className="text-yellow-400 font-bold title-font text-lg">MyKingdom</div>
                                            <div className="flex gap-2">
                                                <div className="bg-purple-900/60 px-3 py-1 rounded text-yellow-100 text-xs">⚔️ 1.5k</div>
                                                <div className="bg-purple-900/60 px-3 py-1 rounded text-yellow-100 text-xs">🪙 2.3k</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Bottom Menu Bar */}
                                <div className="absolute bottom-6 left-4 right-4">
                                    <div className="bg-black/60 backdrop-blur-xl rounded-2xl p-4 border-2 border-purple-500/40 shadow-2xl">
                                        <div className="grid grid-cols-5 gap-3">
                                            <HUDButton
                                                icon="🦸"
                                                label="Heroes"
                                                badgeKey="heroes"
                                                onClick={() => {
                                                    clearBadge('heroes');
                                                    setScreen('heroes');
                                                }}
                                            />
                                            <HUDButton
                                                icon="🏗️"
                                                label="Buildings"
                                                badgeKey="buildings"
                                                onClick={() => {
                                                    clearBadge('buildings');
                                                    setScreen('buildings');
                                                }}
                                            />
                                            <HUDButton
                                                icon="📋"
                                                label="Quests"
                                                badgeKey="quests"
                                                onClick={() => clearBadge('quests')}
                                            />
                                            <HUDButton
                                                icon="🎉"
                                                label="Events"
                                                badgeKey="events"
                                                onClick={() => clearBadge('events')}
                                            />
                                            <HUDButton
                                                icon="📬"
                                                label="Mail"
                                                badgeKey="mail"
                                                onClick={() => clearBadge('mail')}
                                            />
                                        </div>
                                    </div>
                                </div>

                                {/* Info Panel */}
                                <div className="absolute top-32 left-4 bg-black/60 backdrop-blur-md rounded-lg p-3 border border-amber-500/40 max-w-xs">
                                    <div className="text-amber-400 font-bold text-sm mb-1">💡 How Badges Work</div>
                                    <div className="text-white/80 text-xs space-y-1">
                                        <div>• <span className="text-amber-400">!</span> = Urgent (highest priority)</div>
                                        <div>• <span className="text-green-400">↑</span> = Can upgrade now</div>
                                        <div>• <span className="text-purple-400">#</span> = Multiple items</div>
                                        <div>• <span className="text-blue-400">NEW</span> = Fresh content</div>
                                        <div>• <span className="text-red-400">●</span> = General notification</div>
                                        <div className="pt-1 border-t border-white/20 text-white/60">
                                            Tap buttons to clear badges!
                                        </div>
                                    </div>
                                </div>
                            </motion.div>
                        )}

                        {/* Heroes Screen */}
                        {screen === 'heroes' && (
                            <motion.div
                                key="heroes"
                                initial={{ x: '100%' }}
                                animate={{ x: 0 }}
                                exit={{ x: '100%' }}
                                transition={{ type: 'spring', stiffness: 300, damping: 30 }}
                                className="w-full h-full bg-gradient-to-br from-slate-900 to-purple-900 p-6"
                            >
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-yellow-400 font-bold text-2xl title-font">Hero Collection</h2>
                                    <button
                                        onClick={() => setScreen('map')}
                                        className="bg-purple-800/60 px-4 py-2 rounded-lg text-white font-semibold border-2 border-purple-500/40"
                                    >
                                        ← Back
                                    </button>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    {['hero1', 'hero2', 'hero3', 'hero4'].map((heroKey, idx) => (
                                        <motion.div
                                            key={heroKey}
                                            whileTap={{ scale: 0.95 }}
                                            onClick={() => {
                                                clearBadge(heroKey);
                                                setScreen('heroDetail');
                                            }}
                                            className="relative bg-gradient-to-br from-purple-800/40 to-purple-900/40 rounded-xl p-4 border-2 border-purple-500/30 cursor-pointer hover:border-yellow-500/50 transition-all"
                                        >
                                            <div className="text-6xl text-center mb-2">
                                                {['🗡️', '🏹', '🛡️', '⚡'][idx]}
                                            </div>
                                            <div className="text-white font-bold text-center mb-1">
                                                {['Warrior', 'Archer', 'Knight', 'Mage'][idx]}
                                            </div>
                                            <div className="text-yellow-400 text-center text-sm">
                                                Lv {[30, 25, 28, 22][idx]}
                                            </div>
                                            {badges[heroKey] && (
                                                <div className="absolute top-2 right-2">
                                                    {getBadge(badges[heroKey])}
                                                </div>
                                            )}
                                        </motion.div>
                                    ))}
                                </div>

                                <div className="mt-6 bg-black/40 backdrop-blur-md rounded-lg p-4 border border-green-500/40">
                                    <div className="text-green-400 font-bold mb-2">✅ Badge Cleared!</div>
                                    <div className="text-white/70 text-sm">
                                        Entering Heroes screen cleared the main badge. Individual hero badges clear when you tap each hero card.
                                    </div>
                                </div>
                            </motion.div>
                        )}

                        {/* Hero Detail Screen */}
                        {screen === 'heroDetail' && (
                            <motion.div
                                key="heroDetail"
                                initial={{ scale: 0.9, opacity: 0 }}
                                animate={{ scale: 1, opacity: 1 }}
                                exit={{ scale: 0.9, opacity: 0 }}
                                className="w-full h-full bg-gradient-to-br from-slate-900 to-purple-900 p-6"
                            >
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-yellow-400 font-bold text-2xl title-font">Warrior Details</h2>
                                    <button
                                        onClick={() => setScreen('heroes')}
                                        className="bg-purple-800/60 px-4 py-2 rounded-lg text-white font-semibold border-2 border-purple-500/40"
                                    >
                                        ← Back
                                    </button>
                                </div>

                                <div className="bg-gradient-to-br from-purple-800/40 to-purple-900/40 rounded-xl p-6 border-2 border-purple-500/30 mb-4">
                                    <div className="text-8xl text-center mb-4">🗡️</div>
                                    <div className="text-white font-bold text-2xl text-center mb-2">Warrior</div>
                                    <div className="text-yellow-400 text-center text-lg mb-4">Level 30</div>

                                    <div className="grid grid-cols-2 gap-4 mb-6">
                                        <div className="bg-black/40 rounded-lg p-3 text-center">
                                            <div className="text-white/60 text-xs mb-1">ATK</div>
                                            <div className="text-white font-bold text-xl">1,250</div>
                                        </div>
                                        <div className="bg-black/40 rounded-lg p-3 text-center">
                                            <div className="text-white/60 text-xs mb-1">HP</div>
                                            <div className="text-white font-bold text-xl">8,500</div>
                                        </div>
                                    </div>

                                    <motion.button
                                        whileTap={{ scale: 0.95 }}
                                        className="w-full bg-gradient-to-r from-green-600 to-green-700 text-white py-4 rounded-lg font-bold text-lg shadow-lg border-2 border-green-400 relative"
                                    >
                                        ↑ Level Up to 31
                                        <div className="absolute -top-2 -right-2">
                                            <GreenArrow />
                                        </div>
                                    </motion.button>
                                </div>

                                <div className="bg-black/40 backdrop-blur-md rounded-lg p-4 border border-green-500/40">
                                    <div className="text-green-400 font-bold mb-2">✅ Badge Behavior</div>
                                    <div className="text-white/70 text-sm">
                                        • Hero badge cleared when you tapped the card<br/>
                                        • Upgrade button shows green ↑ arrow<br/>
                                        • Clicking "Level Up" would clear this badge instantly
                                    </div>
                                </div>
                            </motion.div>
                        )}

                        {/* Buildings Screen */}
                        {screen === 'buildings' && (
                            <motion.div
                                key="buildings"
                                initial={{ x: '100%' }}
                                animate={{ x: 0 }}
                                exit={{ x: '100%' }}
                                transition={{ type: 'spring', stiffness: 300, damping: 30 }}
                                className="w-full h-full bg-gradient-to-br from-slate-900 to-purple-900 p-6"
                            >
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-yellow-400 font-bold text-2xl title-font">Buildings</h2>
                                    <button
                                        onClick={() => setScreen('map')}
                                        className="bg-purple-800/60 px-4 py-2 rounded-lg text-white font-semibold border-2 border-purple-500/40"
                                    >
                                        ← Back
                                    </button>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    {['building1', 'building2', 'building3'].map((buildingKey, idx) => (
                                        <motion.div
                                            key={buildingKey}
                                            whileTap={{ scale: 0.95 }}
                                            onClick={() => {
                                                clearBadge(buildingKey);
                                                setScreen('buildingDetail');
                                            }}
                                            className="relative bg-gradient-to-br from-purple-800/40 to-purple-900/40 rounded-xl p-4 border-2 border-purple-500/30 cursor-pointer hover:border-yellow-500/50 transition-all"
                                        >
                                            <div className="text-6xl text-center mb-2">
                                                {['🏰', '⚔️', '🏛️'][idx]}
                                            </div>
                                            <div className="text-white font-bold text-center mb-1">
                                                {['Castle', 'Barracks', 'Temple'][idx]}
                                            </div>
                                            <div className="text-yellow-400 text-center text-sm">
                                                Lv {[5, 3, 4][idx]}
                                            </div>
                                            {badges[buildingKey] && (
                                                <div className="absolute top-2 right-2">
                                                    {getBadge(badges[buildingKey])}
                                                </div>
                                            )}
                                        </motion.div>
                                    ))}
                                </div>

                                <div className="mt-6 bg-black/40 backdrop-blur-md rounded-lg p-4 border border-blue-500/40">
                                    <div className="text-blue-400 font-bold mb-2">NEW Badge Example</div>
                                    <div className="text-white/70 text-sm">
                                        The "NEW" badge appears on newly unlocked buildings. It auto-clears after viewing or after 24-48 hours.
                                    </div>
                                </div>
                            </motion.div>
                        )}

                        {/* Building Detail Screen */}
                        {screen === 'buildingDetail' && (
                            <motion.div
                                key="buildingDetail"
                                initial={{ scale: 0.9, opacity: 0 }}
                                animate={{ scale: 1, opacity: 1 }}
                                exit={{ scale: 0.9, opacity: 0 }}
                                className="w-full h-full bg-gradient-to-br from-slate-900 to-purple-900 p-6"
                            >
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-yellow-400 font-bold text-2xl title-font">Castle</h2>
                                    <button
                                        onClick={() => setScreen('buildings')}
                                        className="bg-purple-800/60 px-4 py-2 rounded-lg text-white font-semibold border-2 border-purple-500/40"
                                    >
                                        ← Back
                                    </button>
                                </div>

                                <div className="bg-gradient-to-br from-purple-800/40 to-purple-900/40 rounded-xl p-6 border-2 border-purple-500/30 mb-4">
                                    <div className="text-8xl text-center mb-4">🏰</div>
                                    <div className="text-white font-bold text-2xl text-center mb-2">Castle</div>
                                    <div className="text-yellow-400 text-center text-lg mb-6">Level 5</div>

                                    <div className="bg-black/40 rounded-lg p-4 mb-4">
                                        <div className="text-white/80 text-sm mb-3">
                                            <div className="flex justify-between mb-2">
                                                <span>Current Production:</span>
                                                <span className="text-yellow-400">+50 Gold/hr</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span>Next Level:</span>
                                                <span className="text-green-400">+75 Gold/hr</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <motion.button
                                            whileTap={{ scale: 0.95 }}
                                            className="w-full bg-gradient-to-r from-green-600 to-green-700 text-white py-4 rounded-lg font-bold shadow-lg border-2 border-green-400 relative"
                                        >
                                            ↑ Upgrade to Level 6
                                            <div className="text-xs mt-1 opacity-80">Cost: 5,000 Gold</div>
                                        </motion.button>

                                        <motion.button
                                            whileTap={{ scale: 0.95 }}
                                            className="w-full bg-gradient-to-r from-purple-600 to-purple-700 text-white py-3 rounded-lg font-semibold shadow-lg border-2 border-purple-400"
                                        >
                                            Collect Resources
                                        </motion.button>
                                    </div>
                                </div>

                                <div className="bg-black/40 backdrop-blur-md rounded-lg p-4 border border-green-500/40">
                                    <div className="text-green-400 font-bold mb-2">💡 Upgrade Badge Logic</div>
                                    <div className="text-white/70 text-sm">
                                        • Green ↑ arrow only shows when you have enough resources<br/>
                                        • Badge clears instantly when you complete the upgrade<br/>
                                        • Map badge also cleared when you entered this screen
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
