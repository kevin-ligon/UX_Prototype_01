<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Map Interaction Prototype</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <!-- Top UI Bar -->
        <div class="top-bar">
            <div class="player-info">
                <div class="avatar"></div>
                <span class="player-name">MyLordship</span>
            </div>
            <div class="resources">
                <div class="resource-item">⚔️ 1.5k</div>
                <div class="resource-item">🏰 1.5k</div>
                <div class="resource-item">🛡️ 1.5k</div>
                <div class="resource-item">👥 1.5k</div>
                <div class="resource-item">⭐ 1.5k</div>
            </div>
        </div>

        <!-- Left Menu -->
        <div class="left-menu">
            <button class="menu-btn">Missions<br>Board</button>
            <button class="menu-btn">Clues<br>Board</button>
        </div>

        <!-- Right Menu -->
        <div class="right-menu">
            <button class="menu-btn round">🔥</button>
            <button class="menu-btn round">⚔️</button>
            <button class="menu-btn round">🎯</button>
            <button class="menu-btn round">🏛️</button>
        </div>

        <!-- Map Container -->
        <div class="map-container" id="mapContainer">
            <svg class="map-svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet">
                <!-- Territory backgrounds -->
                <path class="territory green-territory" d="M 50,50 Q 150,80 200,150 L 200,300 Q 180,350 100,380 L 50,350 Z" />
                <path class="territory pink-territory" d="M 400,50 L 750,50 L 750,350 Q 700,380 600,350 L 450,300 Q 400,200 400,100 Z" />
                <path class="territory gray-territory" d="M 200,150 Q 250,180 300,220 L 400,250 L 450,300 L 350,350 Q 250,320 200,300 Z" />

                <!-- Buildings - Each is clickable -->
                <g class="building" data-building-id="castle1" data-type="castle">
                    <circle class="building-base" cx="520" cy="180" r="25" />
                    <image href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='30' y='40' width='40' height='50' fill='%238B4513'/%3E%3Crect x='20' y='20' width='60' height='30' fill='%23654321'/%3E%3Crect x='15' y='15' width='10' height='15' fill='%23654321'/%3E%3Crect x='75' y='15' width='10' height='15' fill='%23654321'/%3E%3C/svg%3E" x="495" y="155" width="50" height="50" />
                    <circle class="tap-indicator" cx="520" cy="180" r="30" />
                </g>

                <g class="building" data-building-id="tower1" data-type="tower">
                    <circle class="building-base" cx="180" cy="120" r="20" />
                    <image href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='35' y='30' width='30' height='60' fill='%23A0522D'/%3E%3Cpolygon points='50,10 65,30 35,30' fill='%23DC143C'/%3E%3C/svg%3E" x="160" y="100" width="40" height="40" />
                    <circle class="tap-indicator" cx="180" cy="120" r="25" />
                </g>

                <g class="building" data-building-id="fort1" data-type="fort">
                    <circle class="building-base" cx="620" cy="280" r="22" />
                    <image href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='25' y='40' width='50' height='45' fill='%23696969'/%3E%3Crect x='20' y='35' width='60' height='10' fill='%23A9A9A9'/%3E%3Crect x='40' y='55' width='20' height='30' fill='%234B4B4B'/%3E%3C/svg%3E" x="598" y="258" width="44" height="44" />
                    <circle class="tap-indicator" cx="620" cy="280" r="27" />
                </g>

                <g class="building" data-building-id="village1" data-type="village">
                    <circle class="building-base" cx="300" cy="200" r="20" />
                    <image href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='30' y='50' width='40' height='35' fill='%238B4513'/%3E%3Cpolygon points='50,30 70,50 30,50' fill='%23CD853F'/%3E%3Crect x='42' y='60' width='16' height='25' fill='%23654321'/%3E%3C/svg%3E" x="280" y="180" width="40" height="40" />
                    <circle class="tap-indicator" cx="300" cy="200" r="25" />
                </g>

                <g class="building" data-building-id="barracks1" data-type="barracks">
                    <circle class="building-base" cx="450" cy="140" r="20" />
                    <image href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='20' y='45' width='60' height='40' fill='%236B4423'/%3E%3Cpolygon points='50,25 80,45 20,45' fill='%238B0000'/%3E%3Crect x='35' y='60' width='12' height='25' fill='%234B4B4B'/%3E%3Crect x='53' y='60' width='12' height='25' fill='%234B4B4B'/%3E%3C/svg%3E" x="430" y="120" width="40" height="40" />
                    <circle class="tap-indicator" cx="450" cy="140" r="25" />
                </g>
            </svg>

            <!-- Contextual Menu (hidden by default) -->
            <div class="contextual-menu" id="contextualMenu">
                <div class="menu-header">
                    <span class="menu-title" id="menuTitle">Castle</span>
                    <button class="close-btn" id="closeMenu">×</button>
                </div>
                <div class="menu-content">
                    <button class="menu-option primary">
                        <span class="option-icon">⚔️</span>
                        <span class="option-text" id="primaryOption">1.5 Million Swordmen</span>
                    </button>
                    <button class="menu-option">
                        <span class="option-icon">⬆️</span>
                        <span class="option-text">Upgrade</span>
                    </button>
                    <button class="menu-option">
                        <span class="option-icon">🔍</span>
                        <span class="option-text">Search</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Ripple effect container -->
        <div class="ripple-container" id="rippleContainer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
